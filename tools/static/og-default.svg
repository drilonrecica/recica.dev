<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Recica Tools</title>
  <desc id="desc">Free local browser tools for developers and everyday tasks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f14" />
      <stop offset="100%" stop-color="#10161d" />
    </linearGradient>
    <radialGradient id="glowA" cx="0.2" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="#1ec8a5" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#1ec8a5" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="0.8" cy="0.25" r="0.5">
      <stop offset="0%" stop-color="#4da3ff" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#4da3ff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glowA)" />
  <rect width="1200" height="630" fill="url(#glowB)" />

  <g transform="translate(84 78)">
    <rect x="0" y="0" width="180" height="48" rx="24" fill="#123b38" stroke="#1ec8a5" stroke-opacity="0.25" />
    <text x="90" y="31" text-anchor="middle" fill="#eaf2f8" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Recica Lab</text>

    <text x="0" y="140" fill="#eaf2f8" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800">
      <tspan x="0" dy="0">Free local browser tools</tspan>
      <tspan x="0" dy="86">for developers and daily work.</tspan>
    </text>

    <text x="0" y="320" fill="#a5b4c3" font-family="Inter, Arial, sans-serif" font-size="31">
      QR codes, JSON, Base64, timestamps, SQL, hashing,
    </text>
    <text x="0" y="364" fill="#a5b4c3" font-family="Inter, Arial, sans-serif" font-size="31">
      regex, diffs, previews, and more. No account. No upload.
    </text>

    <g transform="translate(0 430)">
      <rect x="0" y="0" width="194" height="52" rx="26" fill="#151c24" stroke="#263341" />
      <text x="97" y="33" text-anchor="middle" fill="#eaf2f8" font-family="JetBrains Mono, monospace" font-size="24">free</text>
      <rect x="214" y="0" width="194" height="52" rx="26" fill="#151c24" stroke="#263341" />
      <text x="311" y="33" text-anchor="middle" fill="#eaf2f8" font-family="JetBrains Mono, monospace" font-size="24">local</text>
      <rect x="428" y="0" width="194" height="52" rx="26" fill="#151c24" stroke="#263341" />
      <text x="525" y="33" text-anchor="middle" fill="#eaf2f8" font-family="JetBrains Mono, monospace" font-size="24">privacy-safe</text>
    </g>
  </g>
</svg>
